# TODO: Horrible hacks to get around Dist's bad escaping

# Cache
- name: Run sccache-cache
  uses: mozilla-actions/sccache-action@v0.0.9
- name: Configure sccache
  uses: actions/github-script@v7
  with:
      script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || ''); core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
- shell: bash
  name: Configure use of sccache
  run: |
      echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
      echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
      echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
      echo "CMAKE_CUDA_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

# Cargo registry
- name: Cache Rust registry
  uses: actions/cache@v3
  with:
      path: |
          |
                          ~/.cargo/git
                          !~/.cargo/git/checkouts
                          ~/.cargo/registry
                          !~/.cargo/registry/src
      key: rust-registry-${{hashFiles('**/Cargo.lock') }}
