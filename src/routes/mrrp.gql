query GetFlacTracks($cursor: String, $order: OrderByEnum = ASC) {
    tracks(
        filters: { filename: { ends_with: ".flac" } }
        pagination: { cursor: { limit: 100 cursor: $cursor }  }
        orderBy: {
            id: $order
        }

    ) {
        nodes {
            filePath
            title
            artist
            album
            date
            trackNumber
            durationSecs
            recordingId
            id
        }
        pageInfo {
            hasNextPage
            hasPreviousPage
            endCursor
            startCursor
        }
    }
}
