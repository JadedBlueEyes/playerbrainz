query GetFlacTracks($cursor: String, $order: OrderByEnum = ASC) {
    tracks(
        filters: { filename: { ends_with: ".flac" } }
        pagination: { cursor: { limit: 100 cursor: $cursor }  }
        orderBy: {
            id: $order
        }

    ) {
        nodes {
            filePath
            title
            artist
            album
            date
            trackNumber
            durationSecs
            recordingId
            id

            trackMedia (filters:  {
                usage:  {
                   eq: "FrontCover"
                }

            } orderBy: {
               visualIndex: ASC
            }
            pagination:  {
                page:  {
                    limit: 1
                    page: 0
                }
            }) {
              nodes {
                id
                usage
                mediaType
                colorMode
                visualIndex
              }
            }
        }
        pageInfo {
            hasNextPage
            hasPreviousPage
            endCursor
            startCursor
        }
    }
}
