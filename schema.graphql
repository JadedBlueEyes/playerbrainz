type Array {
  array: ColumnType!
}

type Column {
  comment: String
  name: String!
  nullable: Boolean!
  type_: ColumnType!
  unique: Boolean
}

type ColumnType {
  array: Array
  enumeration: Enumeration
  primitive: String
}

input CursorInput {
  cursor: String
  limit: Int!
}

type Enumeration {
  name: String!
  variants: [String!]!
}

input FloatFilterInput {
  between: [Float!]
  eq: Float
  gt: Float
  gte: Float
  is_in: [Float!]
  is_not_in: [Float!]
  is_null: Boolean
  lt: Float
  lte: Float
  ne: Float
  not_between: [Float!]
}

input IntegerFilterInput {
  between: [Int!]
  eq: Int
  gt: Int
  gte: Int
  is_in: [Int!]
  is_not_in: [Int!]
  is_null: Boolean
  lt: Int
  lte: Int
  ne: Int
  not_between: [Int!]
}

type Mutation {
  _ping: String
}

input OffsetInput {
  limit: Int!
  offset: Int!
}

enum OrderByEnum {
  ASC
  DESC
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

input PageInput {
  limit: Int!
  page: Int!
}

type PaginationInfo {
  current: Int!
  offset: Int!
  pages: Int!
  total: Int!
}

input PaginationInput {
  cursor: CursorInput
  offset: OffsetInput
  page: PageInput
}

type Query {
  _sea_orm_entity_metadata(table_name: String!): Table!
  trackMedia(filters: TrackMediaFilterInput, having: TrackMediaHavingInput, orderBy: TrackMediaOrderInput, pagination: PaginationInput): TrackMediaConnection!
  tracks(filters: TracksFilterInput, having: TracksHavingInput, orderBy: TracksOrderInput, pagination: PaginationInput): TracksConnection!
}

input StringFilterInput {
  between: [String!]
  ci_eq: String
  contains: String
  ends_with: String
  eq: String
  gt: String
  gte: String
  is_in: [String!]
  is_not_in: [String!]
  is_null: Boolean
  like: String
  lt: String
  lte: String
  ne: String
  not_between: [String!]
  not_like: String
  starts_with: String
}

type Table {
  columns: [Column!]!
  comment: String
  primary_key: [String!]!
}

input TextFilterInput {
  between: [String!]
  eq: String
  gt: String
  gte: String
  is_in: [String!]
  is_not_in: [String!]
  is_null: Boolean
  lt: String
  lte: String
  ne: String
  not_between: [String!]
}

type TrackMedia {
  colorMode: String
  height: Int
  id: Int!
  mediaType: String
  track: Tracks
  trackId: Int!
  usage: String
  visualIndex: Int!
  width: Int
}

type TrackMediaConnection {
  edges: [TrackMediaEdge!]!
  nodes: [TrackMedia!]!
  pageInfo: PageInfo!
  paginationInfo: PaginationInfo
}

type TrackMediaEdge {
  cursor: String!
  node: TrackMedia!
}

input TrackMediaFilterInput {
  and: [TrackMediaFilterInput!]
  colorMode: StringFilterInput
  height: IntegerFilterInput
  id: IntegerFilterInput
  mediaType: StringFilterInput
  not: TrackMediaFilterInput
  or: [TrackMediaFilterInput!]
  trackId: IntegerFilterInput
  usage: StringFilterInput
  visualIndex: IntegerFilterInput
  width: IntegerFilterInput
}

input TrackMediaHavingInput {
  track: TracksFilterInput
}

input TrackMediaOrderInput {
  colorMode: OrderByEnum
  height: OrderByEnum
  id: OrderByEnum
  mediaType: OrderByEnum
  trackId: OrderByEnum
  usage: OrderByEnum
  visualIndex: OrderByEnum
  width: OrderByEnum
}

type Tracks {
  album: String
  albumGainDb: Float
  albumPeak: Float
  artist: String
  createdAt: String!
  date: String
  durationSecs: Float
  filePath: String!
  fileSize: Int!
  filename: String!
  genre: String
  id: Int!
  lastModified: Int!
  recordingId: String
  title: String
  trackGainDb: Float
  trackMedia(filters: TrackMediaFilterInput, orderBy: TrackMediaOrderInput, pagination: PaginationInput): TrackMediaConnection!
  trackNumber: String
  trackPeak: Float
  updatedAt: String!
}

type TracksConnection {
  edges: [TracksEdge!]!
  nodes: [Tracks!]!
  pageInfo: PageInfo!
  paginationInfo: PaginationInfo
}

type TracksEdge {
  cursor: String!
  node: Tracks!
}

input TracksFilterInput {
  album: StringFilterInput
  albumGainDb: FloatFilterInput
  albumPeak: FloatFilterInput
  and: [TracksFilterInput!]
  artist: StringFilterInput
  createdAt: TextFilterInput
  date: StringFilterInput
  durationSecs: FloatFilterInput
  filePath: StringFilterInput
  fileSize: IntegerFilterInput
  filename: StringFilterInput
  genre: StringFilterInput
  id: IntegerFilterInput
  lastModified: IntegerFilterInput
  not: TracksFilterInput
  or: [TracksFilterInput!]
  recordingId: TextFilterInput
  title: StringFilterInput
  trackGainDb: FloatFilterInput
  trackNumber: StringFilterInput
  trackPeak: FloatFilterInput
  updatedAt: TextFilterInput
}

input TracksHavingInput {
  trackMedia: TrackMediaFilterInput
}

input TracksOrderInput {
  album: OrderByEnum
  albumGainDb: OrderByEnum
  albumPeak: OrderByEnum
  artist: OrderByEnum
  artistIds: OrderByEnum
  createdAt: OrderByEnum
  date: OrderByEnum
  durationSecs: OrderByEnum
  filePath: OrderByEnum
  fileSize: OrderByEnum
  filename: OrderByEnum
  genre: OrderByEnum
  id: OrderByEnum
  lastModified: OrderByEnum
  recordingId: OrderByEnum
  releaseGroupIds: OrderByEnum
  releaseIds: OrderByEnum
  title: OrderByEnum
  trackGainDb: OrderByEnum
  trackNumber: OrderByEnum
  trackPeak: OrderByEnum
  updatedAt: OrderByEnum
  workIds: OrderByEnum
}