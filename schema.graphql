schema {
  query: Query
  mutation: FsLibraryMutation
}

input CreateFilesystemLibraryInput {
  """Optional human-friendly name."""
  displayName: String

  """Filesystem path for the library. Must be unique."""
  path: String!
}

"""
Implement the DateTime<FixedOffset> scalar

The input/output is a string in RFC3339 format.
"""
scalar DateTime

input DeleteFilesystemLibraryInput {
  id: Int!
}

type FilesystemLibrary {
  createdAt: DateTime!
  displayName: String
  id: Int!
  path: String!
  updatedAt: DateTime!
}

type FsLibraryMutation {
  createFilesystemLibrary(input: CreateFilesystemLibraryInput!): FilesystemLibrary!
  deleteFilesystemLibrary(input: DeleteFilesystemLibraryInput!): Boolean!
  updateFilesystemLibrary(input: UpdateFilesystemLibraryInput!): FilesystemLibrary!
}

type Query {
  filesystemLibraries: [FilesystemLibrary!]!
  filesystemLibraryById(id: Int!): FilesystemLibrary
  filesystemLibraryByPath(path: String!): FilesystemLibrary
  hello: String!
  whoami: User!
}

input UpdateFilesystemLibraryInput {
  displayName: String
  id: Int!
  path: String
}

type User {
  admin: Boolean!
  createdAt: DateTime!
  displayName: String
  id: Int!
  slug: String!
  updatedAt: DateTime!
}